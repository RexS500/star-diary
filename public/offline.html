<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#2563a6">
  <title>星星日記｜目前離線</title>
  <style>
    :root{font-family:ui-rounded,"SF Pro Rounded","Noto Sans TC",system-ui,sans-serif;color:#17324d;background:#f4f8fd}
    *{box-sizing:border-box}body{min-height:100svh;margin:0;display:grid;place-items:center;padding:24px}
    main{width:min(100%,420px);padding:34px 24px;text-align:center;background:#fff;border:1px solid #d7e5f3;border-radius:24px;box-shadow:0 18px 50px rgba(37,99,166,.12)}
    img{width:92px;height:92px;border-radius:22px}h1{margin:20px 0 8px;font-size:28px}p{margin:0;color:#61748a;line-height:1.7}
    button{min-height:46px;margin-top:24px;padding:0 22px;border:0;border-radius:14px;background:#2563a6;color:#fff;font:700 16px inherit}
  </style>
</head>
<body>
  <main>
    <img src="/star-diary-logo.jpg" alt="星星日記">
    <h1>目前沒有網路連線</h1>
    <p>為了保護家庭資料，離線時不會顯示先前登入帳號的私人紀錄。連線恢復後即可繼續使用。</p>
    <button type="button" onclick="location.reload()">重新連線</button>
  </main>
</body>
</html>
